name: budgetbuddy
description: BudgetBuddy is a modern Flutter budgeting assistant for Android.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.2.4
  path_provider: ^2.1.4
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.0.2
  google_fonts: ^6.2.1
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: 0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/savings_100dp_75FB4C.png"
  adaptive_icon_background: "#0F766E"
  adaptive_icon_foreground: "assets/savings_100dp_75FB4C.png"

flutter:
  uses-material-design: true
